<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 5vh;
        }
        .product-image {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 5rem;
        }
        .price-tag {
            font-size: 2.5rem;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="product-card text-center">
                <div class="product-image">
                    📚
                </div>
                <div class="p-5">
                    <h2 class="mb-3">{{ product_name }}</h2>
                    <p class="text-muted mb-4">Master modern web development with our comprehensive guide. Instant digital delivery after purchase.</p>
                    <div class="price-tag mb-4">₹{{ price }}</div>
                    
                    <form action="/checkout" method="POST">
                        <div class="mb-3 text-start">
                            <label for="mobile" class="form-label">WhatsApp / Mobile Number</label>
                            <input type="tel" class="form-control" id="mobile" name="mobile" placeholder="Enter 10 digit number" required pattern="[0-9]{10}">
                            <div class="form-text">We'll use this to send your receipt.</div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100" style="background-color: #764ba2; border: none;">
                            Buy Now Securely
                        </button>
                    </form>
                </div>
            </div>
            
            <p class="text-center text-muted mt-4">
                <small>🔒 Secure Payments Auto-Confirmed via Webhook</small>
            </p>
        </div>
    </div>
</div>

</body>
</html>
